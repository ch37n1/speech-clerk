[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--all-features"]
need_stdout = false

[jobs.clippy]
command = [
    "cargo",
    "clippy",
    "--workspace",
    "--all-targets",
    "--all-features",
    "--",
    "-D",
    "warnings",
]
need_stdout = false

[jobs.test]
command = ["cargo", "test", "--workspace", "--all-targets", "--all-features"]
need_stdout = true

[exports.cargo-json-spans]
auto = true
